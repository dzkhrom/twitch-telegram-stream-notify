name: Twitch Live Notifier

on:
  schedule:
    - cron: "*/1 * * * *"   # проверка каждую минуту
  workflow_dispatch:

jobs:
  check_twitch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Load last state
        id: load_state
        run: |
          if [ -f last_state.txt ]; then
            LAST_STATE=$(cat last_state.txt)
          else
            LAST_STATE="offline"
          fi
          echo "LAST_STATE=$LAST_STATE" >> $GITHUB_ENV

      - name: Check Twitch Stream Status
        id: twitch
        run: |
          STREAM_DATA=$(curl -s -H "Client-ID: ${{ secrets.TWITCH_CLIENT_ID }}" \
                             -H "Authorization: Bearer ${{ secrets.TWITCH_ACCESS_TOKEN }}" \
                             "https://api.twitch.tv/helix/streams?user_login=${{ secrets.TWITCH_USERNAME }}")

          if echo "$STREAM_DATA" | grep -q '"type":"live"'; then
            echo "LIVE=true" >> $GITHUB_ENV
          else
            echo "LIVE=false" >> $GITHUB_ENV
          fi

            - name: Send Telegram Notification
        if: env.LIVE == 'true' && env.LAST_STATE != 'live'
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="Хейхоу! Домашний, уютный стрим уже в эфире ✨%0A🎮 $TITLE%0A👉 https://twitch.tv/${{ secrets.TWITCH_USERNAME }}"


      - name: Save new state
        run: |
          if [ "${LIVE}" = "true" ]; then
            echo "live" > last_state.txt
          else
            echo "offline" > last_state.txt
          fi

      - name: Commit state file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update stream state"
          file_pattern: last_state.txt
